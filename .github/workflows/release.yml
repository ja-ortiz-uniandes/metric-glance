name: Release

# Pushing a tag like v0.44.0 lints the extension, submits it to AMO (listed
# channel), and cuts a GitHub release with the unsigned source .zip attached.
# Can also be run manually from the Actions tab (workflow_dispatch), which
# lints and submits without the tag checks.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   AMO_JWT_ISSUER  - the "JWT issuer" from addons.mozilla.org/developers/addon/api/key/
#   AMO_JWT_SECRET  - the matching "JWT secret"
# These are NOT the same as the HMAC secret in mg-uploader.js; keep them out of
# source control.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Guard: never submit a build whose manifest version does not match the tag.
      - name: Check tag matches manifest version
        if: github.ref_type == 'tag'
        run: |
          manifest_version=$(node -p "require('./extension/manifest.json').version")
          tag_version="${GITHUB_REF_NAME#v}"
          echo "manifest=$manifest_version  tag=$tag_version"
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "::error::Tag $tag_version does not match manifest version $manifest_version"
            exit 1
          fi

      - name: Lint the extension
        run: npx --yes web-ext lint --source-dir extension

      # Build the unsigned source archive (manifest.json at the archive root),
      # the same layout build-zip.ps1 produces locally. This is what gets
      # attached to the GitHub release: listed AMO submissions are distributed
      # and signed by Mozilla, so web-ext does not hand back a signed .xpi.
      - name: Build source zip
        run: |
          version=$(node -p "require('./extension/manifest.json').version")
          mkdir -p web-ext-artifacts
          (cd extension && zip -r -X "../web-ext-artifacts/metric-glance-$version.zip" .)

      - name: Submit to AMO (listed)
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          npx --yes web-ext sign \
            --channel listed \
            --source-dir extension \
            --artifacts-dir web-ext-artifacts

      # Publish the release. Attaches the unsigned source zip (always present);
      # if web-ext also produced a signed .xpi, that is attached too.
      #
      # Visibility is derived from the version:
      #   - Pre-release ("Developer preview"): the whole 0.x series, and any
      #     version with a non-zero patch (x.y.1, x.y.2, ...). Marked pre-release
      #     so it is not flagged "Latest", and titled "vX.Y.Z (Developer preview)".
      #   - Full "Latest" release: only major >= 1 with a .0 patch (e.g. v1.0.0).
      #
      # Notes are prose from the matching CHANGELOG.md section ("## vX.Y.Z") when
      # present, otherwise GitHub's auto-generated commit notes.
      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          major="${version%%.*}"
          patch="${version##*.}"

          prerelease=""
          title="$GITHUB_REF_NAME"
          if [ "$major" = "0" ] || [ "$patch" != "0" ]; then
            prerelease="--prerelease"
            title="$GITHUB_REF_NAME (Developer preview)"
          fi

          notes_args="--generate-notes"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="## $GITHUB_REF_NAME" '
              $0 == ver { flag = 1; next }
              /^## / { flag = 0 }
              flag { print }
            ' CHANGELOG.md > release-notes.md
            if [ -n "$(tr -d '[:space:]' < release-notes.md)" ]; then
              notes_args="--notes-file release-notes.md"
            fi
          fi

          files=$(ls web-ext-artifacts/*.zip web-ext-artifacts/*.xpi 2>/dev/null || true)
          gh release create "$GITHUB_REF_NAME" --title "$title" $prerelease $notes_args $files
