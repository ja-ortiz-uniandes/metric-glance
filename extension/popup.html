<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1f2430;
      background: #ffffff;
      margin: 0;
      width: 248px;
    }
    .site {
      padding: 10px 14px 8px;
      border-bottom: 1px solid #e7e9ee;
    }
    .site .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #8a90a0;
    }
    .site .host {
      font-size: 13px;
      font-weight: 600;
      margin-top: 2px;
      word-break: break-all;
    }
    .site .state {
      font-size: 12px;
      margin-top: 3px;
      color: #1a7f37;
    }
    .site .state.off { color: #b42318; }
    .menu { padding: 6px; }
    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      box-sizing: border-box;
      padding: 9px 10px;
      border: none;
      border-radius: 6px;
      background: transparent;
      font: inherit;
      color: inherit;
      text-align: left;
      cursor: pointer;
    }
    .item:hover, .item:focus-visible { background: #eef0f5; outline: none; }
    .item:disabled { color: #9aa0ad; cursor: default; }
    .item:disabled:hover { background: transparent; }
    .item .ico { width: 18px; text-align: center; flex-shrink: 0; }
    .item .txt { flex: 1; }
    .item .sub { display: block; font-size: 12px; color: #8a90a0; margin-top: 1px; }
    @media (prefers-color-scheme: dark) {
      body { color: #e6e8ee; background: #2a2d35; }
      .site { border-bottom-color: #3a3e48; }
      .item:hover, .item:focus-visible { background: #383c46; }
    }
    /* Mobile (Firefox Android): the popup fills the screen instead of being a
     * small panel. The desktop popup viewport is only 248px wide, so anything
     * wider is the full-screen mobile case. Scale up width, fonts, and touch
     * targets so the menu is comfortably tappable. */
    @media (min-width: 300px) {
      body { width: auto; font-size: 17px; }
      .site { padding: 16px 18px 12px; }
      .site .label { font-size: 13px; }
      .site .host { font-size: 16px; margin-top: 4px; }
      .site .state { font-size: 15px; margin-top: 6px; }
      .menu { padding: 8px; }
      .item { gap: 14px; padding: 14px 14px; border-radius: 10px; }
      .item .ico { width: 26px; font-size: 22px; }
      .item .sub { font-size: 14px; margin-top: 3px; }
    }
  </style>
</head>
<body>
  <div class="site">
    <div class="label">Metric Glance</div>
    <div class="host" id="host">this page</div>
    <div class="state" id="state"></div>
  </div>
  <div class="menu">
    <button class="item" id="toggle">
      <span class="ico" id="toggle-ico">🚫</span>
      <span class="txt" id="toggle-txt">Don't run on this site</span>
    </button>
    <button class="item" id="pick">
      <span class="ico">🎯</span>
      <span class="txt">Mark a missed unit
        <span class="sub">Point at text the converter skipped</span>
      </span>
    </button>
    <button class="item" id="settings">
      <span class="ico">⚙️</span>
      <span class="txt">Open all settings
        <span class="sub">Rounding, units, disabled sites, data</span>
      </span>
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
